<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khutbah Translate — Live Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans:wght@400;600&family=Noto+Sans+Arabic:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&family=Noto+Sans+Bengali:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0e1a;
    color: #e8e8e8;
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Header Bar ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 30px;
    background: linear-gradient(135deg, #0d1526 0%, #162040 100%);
    border-bottom: 1px solid rgba(100,160,255,0.15);
  }
  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: rgba(100,180,255,0.8);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-mosque {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .status-dot.live { background: #00e676; box-shadow: 0 0 8px #00e676; animation: pulse-dot 2s infinite; }
  .status-dot.waiting { background: #ffa726; }
  .status-dot.offline { background: #ef5350; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── Main Content Area ── */
  .display-area {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
    padding: 20px 30px;
    gap: 16px;
  }

  /* ── Arabic Source (Top) ── */
  .arabic-source {
    text-align: center;
    padding: 20px 40px;
    background: linear-gradient(135deg, rgba(30,50,80,0.6) 0%, rgba(20,35,60,0.4) 100%);
    border: 1px solid rgba(100,160,255,0.12);
    border-radius: 12px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .arabic-text {
    font-family: 'Amiri', 'Noto Sans Arabic', serif;
    font-size: 28px;
    line-height: 1.8;
    color: #ffffff;
    direction: rtl;
    text-shadow: 0 0 20px rgba(100,180,255,0.15);
  }
  .arabic-text.quran {
    color: #64b5f6;
    font-size: 32px;
    text-shadow: 0 0 30px rgba(100,180,255,0.25);
  }
  .verse-badge {
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 10px;
    color: #64b5f6;
    background: rgba(100,180,255,0.1);
    border: 1px solid rgba(100,180,255,0.2);
    padding: 2px 10px;
    border-radius: 4px;
    font-family: 'Noto Sans', sans-serif;
    letter-spacing: 1px;
  }
  .quran-icon {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 18px;
  }

  /* ── Translation Panels ── */
  .translations-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    overflow: hidden;
  }

  .lang-panel {
    background: rgba(15,20,35,0.8);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .lang-panel.quran-mode {
    border-color: rgba(100,180,255,0.2);
    background: rgba(15,25,50,0.8);
  }

  .lang-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .lang-name {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .lang-flag {
    font-size: 16px;
  }

  .lang-text {
    font-size: 18px;
    line-height: 1.7;
    color: #d0d0d0;
    flex: 1;
    display: flex;
    align-items: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .lang-text.rtl {
    direction: rtl;
    text-align: right;
    font-family: 'Noto Sans Arabic', sans-serif;
  }
  .lang-text.devanagari {
    font-family: 'Noto Sans Devanagari', sans-serif;
  }
  .lang-text.bengali {
    font-family: 'Noto Sans Bengali', sans-serif;
  }
  .lang-text.quran-verse {
    color: #90caf9;
    font-style: italic;
  }

  /* ── Fade Animation ── */
  .fade-in {
    animation: fadeSlideIn 0.6s ease forwards;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 8px;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  /* ── Waiting State ── */
  .waiting-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }
  .waiting-icon { font-size: 48px; opacity: 0.3; }
  .waiting-text { font-size: 14px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }

  /* ── Responsive ── */
  @media (max-width: 1024px) {
    .translations-grid { grid-template-columns: repeat(2, 1fr); }
    .arabic-text { font-size: 24px; }
    .lang-text { font-size: 16px; }
  }
  @media (max-width: 640px) {
    .translations-grid { grid-template-columns: 1fr; }
    .arabic-text { font-size: 20px; }
  }
  @media (min-width: 1920px) {
    .arabic-text { font-size: 36px; }
    .lang-text { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">☪ Khutbah Translate</div>
    <div class="header-mosque" id="mosque-name">Mosque Display — Live Translation</div>
  </div>
  <div class="header-status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Initializing...</span>
  </div>
</div>

<div class="display-area">
  <!-- Arabic Source -->
  <div class="arabic-source" id="arabic-source">
    <div class="arabic-text" id="arabic-text"></div>
    <div class="verse-badge" id="verse-badge" style="display:none"></div>
    <div class="quran-icon" id="quran-icon" style="display:none">📖</div>
  </div>

  <!-- Translation Panels -->
  <div class="translations-grid" id="translations-grid">
    <!-- Panels injected by JS -->
  </div>
</div>

<div class="footer">
  KHUTBAH TRANSLATE • LIVE SERMON TRANSLATION • POWERED BY AI
</div>

<script>
// ─── Configuration ───────────────────────────────────────────────────────────
const LANGUAGES = [
  { code: 'en', name: 'English', flag: '🇬🇧', dir: 'ltr', fontClass: '' },
  { code: 'ur', name: 'Urdu', flag: '🇵🇰', dir: 'rtl', fontClass: 'rtl' },
  { code: 'hi', name: 'Hindi', flag: '🇮🇳', dir: 'ltr', fontClass: 'devanagari' },
  { code: 'bn', name: 'Bengali', flag: '🇧🇩', dir: 'ltr', fontClass: 'bengali' },
  { code: 'ml', name: 'Malayalam', flag: '🇮🇳', dir: 'ltr', fontClass: '' },
  { code: 'fr', name: 'French', flag: '🇫🇷', dir: 'ltr', fontClass: '' },
];

// ─── Build Language Panels ───────────────────────────────────────────────────
const grid = document.getElementById('translations-grid');
LANGUAGES.forEach(lang => {
  const panel = document.createElement('div');
  panel.className = 'lang-panel';
  panel.id = `panel-${lang.code}`;
  panel.innerHTML = `
    <div class="lang-header">
      <span class="lang-name">${lang.name}</span>
      <span class="lang-flag">${lang.flag}</span>
    </div>
    <div class="lang-text ${lang.fontClass} ${lang.dir === 'rtl' ? 'rtl' : ''}" id="text-${lang.code}">
      <span style="color:rgba(255,255,255,0.2);font-size:13px">Waiting for sermon...</span>
    </div>
  `;
  grid.appendChild(panel);
});

// ─── Display Controller ──────────────────────────────────────────────────────
function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  text.textContent = state === 'live' ? 'LIVE' : state === 'waiting' ? 'Waiting...' : 'Offline';
}

function displaySegment(segment) {
  const isQuran = segment.is_quran;
  const arabicEl = document.getElementById('arabic-text');
  const badge = document.getElementById('verse-badge');
  const icon = document.getElementById('quran-icon');
  const source = document.getElementById('arabic-source');
  
  // Arabic text
  arabicEl.textContent = segment.text || '';
  arabicEl.className = 'arabic-text' + (isQuran ? ' quran' : '');
  
  // Verse badge
  if (isQuran && segment.verse_info) {
    badge.textContent = segment.verse_info;
    badge.style.display = 'block';
    icon.style.display = 'block';
  } else {
    badge.style.display = 'none';
    icon.style.display = 'none';
  }
  
  // Translations
  const translations = segment.translations || {};
  LANGUAGES.forEach(lang => {
    const el = document.getElementById(`text-${lang.code}`);
    const panel = document.getElementById(`panel-${lang.code}`);
    const text = translations[lang.code] || '';
    
    if (text) {
      el.innerHTML = text;
      el.className = `lang-text ${lang.fontClass} ${lang.dir === 'rtl' ? 'rtl' : ''} ${isQuran ? 'quran-verse' : ''} fade-in`;
      panel.className = 'lang-panel' + (isQuran ? ' quran-mode' : '');
    }
  });
}

// ─── Demo Mode (plays through test data) ────────────────────────────────────
async function runDemo() {
  setStatus('live');
  
  // Try to load real pipeline result
  let segments = [];
  try {
    const r = await fetch('/api/trading/portfolio'); // test connectivity
  } catch {}
  
  // Try loading the test translation result
  try {
    const r = await fetch('./translation-result.json');
    if (r.ok) {
      const data = await r.json();
      segments = data.segments || [];
    }
  } catch {}
  
  if (segments.length === 0) {
    // Hardcoded demo data
    segments = [
      {
        text: 'بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ',
        is_quran: true,
        verse_info: 'Al-Faatiha 1:1',
        translations: {
          en: 'In the name of Allah, the Entirely Merciful, the Especially Merciful.',
          ur: 'شروع الله کا نام لے کر جو بڑا مہربان نہایت رحم والا ہے',
          hi: 'अल्लाह के नाम से जो रहमान व रहीम है।',
          bn: 'পরম করুণাময় ও অসীম দয়ালু আল্লাহর নামে।',
          ml: 'പരമ കാരുണികനും കൃപാനിധിയുമായ അല്ലാഹുവിന്‍റെ നാമത്തില്‍.',
          fr: 'Au nom d\'Allah, le Tout Miséricordieux, le Très Miséricordieux.',
        }
      },
      {
        text: 'ٱلْحَمْدُ لِلَّهِ رَبِّ ٱلْعَٰلَمِينَ',
        is_quran: true,
        verse_info: 'Al-Faatiha 1:2',
        translations: {
          en: '[All] praise is [due] to Allah, Lord of the worlds.',
          ur: 'سب طرح کی تعریف خدا ہی کو سزاوار ہے جو تمام مخلوقات کا پروردگار ہے',
          hi: 'तारीफ़ अल्लाह ही के लिये है जो तमाम क़ायनात का रब है।',
          bn: 'যাবতীয় প্রশংসা আল্লাহ তা\'আলার জন্যে যিনি সকল সৃষ্টির পালনকর্তা।',
          ml: 'സര്‍വ്വലോകങ്ങളുടെയും രക്ഷിതാവായ അല്ലാഹുവിന് സ്തുതി.',
          fr: 'Louange à Allah, Seigneur de l\'univers.',
        }
      },
      {
        text: 'أيها المسلمون إن الله سبحانه وتعالى أمرنا بالصبر والصلاة',
        is_quran: false,
        translations: {
          en: 'O Muslims, indeed Allah has commanded us to have patience and to perform prayer.',
          ur: 'اے مسلمانوں، بے شک اللہ نے ہمیں صبر اور نماز کا حکم دیا ہے۔',
          hi: 'हे मुसलमानों, अल्लाह ने हमें धैर्य और प्रार्थना का आदेश दिया है।',
          bn: 'হে মুসলমানগণ, আল্লাহ আমাদের ধৈর্য ও প্রার্থনার আদেশ দিয়েছেন।',
          ml: 'മുസ്ലിംകളേ, അല്ലാഹു നമ്മോട് ക്ഷമയും നമസ്കാരവും കൽപിച്ചിരിക്കുന്നു.',
          fr: 'Ô musulmans, Allah nous a ordonné la patience et la prière.',
        }
      },
      {
        text: 'يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوا۟ ٱسْتَعِينُوا۟ بِٱلصَّبْرِ وَٱلصَّلَوٰةِ ۚ إِنَّ ٱللَّهَ مَعَ ٱلصَّٰبِرِينَ',
        is_quran: true,
        verse_info: 'Al-Baqara 2:153',
        translations: {
          en: 'O you who have believed, seek help through patience and prayer. Indeed, Allah is with the patient.',
          ur: 'اے ایمان والو صبر اور نماز سے مدد لیا کرو بےشک خدا صبر کرنے والوں کے ساتھ ہے',
          hi: 'ऐ ईमानदारों मुसीबत के वक्त सब्र और नमाज़ के ज़रिए से ख़ुदा की मदद माँगों',
          bn: 'হে ঈমানদারগণ! ধৈর্য ও নামাযের মাধ্যমে সাহায্য প্রার্থনা কর।',
          ml: 'സത്യവിശ്വാസികളേ, ക്ഷമയും നമസ്കാരവും മുഖേന സഹായം തേടുക.',
          fr: 'Ô les croyants! Cherchez secours dans la patience et la Salât. Car Allah est avec les patients.',
        }
      },
      {
        text: 'إِنَّ مَعَ ٱلْعُسْرِ يُسْرًۭا',
        is_quran: true,
        verse_info: 'Ash-Sharh 94:6',
        translations: {
          en: 'Indeed, with hardship [will be] ease.',
          ur: 'بے شک مشکل کے ساتھ آسانی ہے',
          hi: 'यक़ीनन दुश्वारी के साथ आसानी है',
          bn: 'নিশ্চয়ই কষ্টের সাথে স্বস্তি রয়েছে।',
          ml: 'തീര്‍ച്ചയായും ഞെരുക്കത്തോടൊപ്പം ആശ്വാസമുണ്ട്.',
          fr: 'Certes, avec la difficulté il y a une facilité.',
        }
      },
      {
        text: 'فالصبر أيها المؤمنون هو مفتاح الفرج وطريق النجاح في الدنيا والآخرة',
        is_quran: false,
        translations: {
          en: 'So patience, O believers, is the key to relief and the path to success in this world and the Hereafter.',
          ur: 'صبر، اے مومنوں، راحت کی کنجی اور دنیا و آخرت میں کامیابی کا راستہ ہے۔',
          hi: 'सब्र, ऐ मोमिनों, राहत की कुंजी और दुनिया और आख़िरत में सफलता का रास्ता है।',
          bn: 'ধৈর্য, হে মুমিনগণ, স্বস্তির চাবি এবং ইহকাল ও পরকালে সাফল্যের পথ।',
          ml: 'വിശ്വാസികളേ, ക്ഷമ ആശ്വാസത്തിന്റെ താക്കോലും ഇഹലോകത്തും പരലോകത്തും വിജയത്തിന്റെ പാതയുമാണ്.',
          fr: 'Alors la patience, ô croyants, est la clé du soulagement et le chemin du succès.',
        }
      },
    ];
  }
  
  // Play through segments with timing
  let idx = 0;
  async function playNext() {
    if (idx >= segments.length) {
      idx = 0; // loop for demo
      await new Promise(r => setTimeout(r, 3000));
    }
    
    displaySegment(segments[idx]);
    idx++;
    
    // Quran verses display longer
    const delay = segments[idx - 1]?.is_quran ? 6000 : 4000;
    setTimeout(playNext, delay);
  }
  
  playNext();
}

// ─── WebSocket Mode (for live operation) ─────────────────────────────────────
function connectWebSocket(url) {
  setStatus('waiting');
  
  const ws = new WebSocket(url);
  
  ws.onopen = () => {
    setStatus('live');
    console.log('Connected to Khutbah server');
  };
  
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      // Only display segment messages; ignore status, pong, clear, etc.
      if (msg.type === 'segment') {
        displaySegment(msg);
      } else if (msg.type === 'status') {
        console.log('Server status:', msg);
        if (msg.running) setStatus('live');
      } else if (msg.type === 'clear') {
        // Optionally clear display on explicit clear message
        console.log('Clear received');
      }
      // Silently ignore: pong, ping, unknown types
    } catch(e) {
      console.error('Parse error:', e);
    }
  };
  
  ws.onclose = () => {
    setStatus('offline');
    console.log('Disconnected. Reconnecting in 3s...');
    setTimeout(() => connectWebSocket(url), 3000);
  };
  
  ws.onerror = () => {
    setStatus('offline');
  };
}

// ─── Init ────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const wsUrl = params.get('ws');

if (wsUrl) {
  connectWebSocket(wsUrl);
} else {
  // Demo mode
  document.getElementById('mosque-name').textContent = 'Demo Mode — Sample Khutbah';
  runDemo();
}
</script>
</body>
</html>
